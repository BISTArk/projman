name: Release Build

on:
  push:
    tags:
      - 'v*' # Triggers on tags starting with v (e.g., v1.0.0)

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install System Dependencies
        run: npm install

      - name: Build and Package Tauri App
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ProjMan ${{ github.ref_name }}'
          releaseBody: 'Automatic release built by GitHub Actions.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
